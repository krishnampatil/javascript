<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>QuizMaster</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- START SCREEN -->
  <div id="start-screen" class="screen active">
    <div class="start-card">
      <div class="logo">
        <span class="logo-icon">&#9711;</span>
        <h1>QuizMaster</h1>
      </div>
      <p class="tagline">Test your knowledge. Track your time. Earn your grade.</p>
      <ul class="info-list">
        <li><span class="dot"></span> 10 Questions</li>
        <li><span class="dot"></span> 4 Options Each</li>
        <li><span class="dot"></span> Timed Per Question</li>
        <li><span class="dot"></span> Detailed Review at End</li>
      </ul>
      <button id="start-btn" class="btn-primary">Start Quiz</button>
    </div>
  </div>

  <!-- QUIZ SCREEN -->
  <div id="quiz-screen" class="screen">
    <div class="quiz-header">
      <div class="progress-info">
        <span id="q-counter">Question 1 / 10</span>
        <span id="q-timer" class="timer">0s</span>
      </div>
      <div class="progress-bar-wrap">
        <div class="progress-bar" id="progress-bar"></div>
      </div>
    </div>

    <div class="question-card">
      <p id="question-text" class="question-text">Loading...</p>
      <div id="options-grid" class="options-grid"></div>
      <button id="next-btn" class="btn-primary" style="display:none;">Next &rarr;</button>
    </div>
  </div>

  <!-- RESULT SCREEN -->
  <div id="result-screen" class="screen">
    <div class="result-card">
      <div class="grade-badge" id="grade-badge">A+</div>
      <h2 id="result-title">Excellent!</h2>
      <p id="result-feedback" class="feedback-text"></p>

      <div class="stats-grid">
        <div class="stat-box correct-box">
          <span id="correct-count">0</span>
          <label>Correct</label>
        </div>
        <div class="stat-box wrong-box">
          <span id="wrong-count">0</span>
          <label>Wrong</label>
        </div>
        <div class="stat-box percent-box">
          <span id="percent-display">0%</span>
          <label>Score</label>
        </div>
        <div class="stat-box time-box">
          <span id="total-time-display">0s</span>
          <label>Total Time</label>
        </div>
      </div>

      <div class="review-section">
        <h3>Question Review</h3>
        <div id="review-list"></div>
      </div>

      <button id="restart-btn" class="btn-primary">Try Again</button>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
