<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Image Search App</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Georgia, serif;
      background: #fff;
      color: #111;
      min-height: 100vh;
    }

    header {
      border-bottom: 2px solid #111;
      padding: 24px 40px;
    }

    header h1 {
      font-size: 1.6rem;
      font-weight: normal;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .search-section {
      padding: 32px 40px;
      border-bottom: 1px solid #ddd;
      display: flex;
      gap: 12px;
    }

    .search-section input {
      flex: 1;
      padding: 10px 14px;
      font-size: 1rem;
      border: 1px solid #bbb;
      outline: none;
      font-family: inherit;
    }

    .search-section input:focus {
      border-color: #111;
    }

    .search-section button {
      padding: 10px 24px;
      background: #111;
      color: #fff;
      border: none;
      font-size: 1rem;
      cursor: pointer;
      font-family: inherit;
      letter-spacing: 0.05em;
    }

    .search-section button:hover {
      background: #333;
    }

    #error-banner {
      display: none;
      background: #fee;
      border: 1px solid #f88;
      color: #900;
      padding: 12px 40px;
      font-size: 0.9rem;
    }

    #loading {
      display: none;
      padding: 32px;
      text-align: center;
      font-size: 0.9rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #666;
    }

    #loading span {
      display: inline-block;
      animation: pulse 1.2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    #gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 2px;
      padding: 2px;
    }

    .gallery-item {
      position: relative;
      overflow: hidden;
      aspect-ratio: 1;
      background: #f5f5f5;
    }

    .gallery-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.3s ease;
    }

    .gallery-item:hover img {
      transform: scale(1.04);
    }

    .gallery-item .caption {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(0,0,0,0.55);
      color: #fff;
      font-size: 0.75rem;
      padding: 6px 8px;
      opacity: 0;
      transition: opacity 0.25s;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .gallery-item:hover .caption {
      opacity: 1;
    }

    #load-more-section {
      display: none;
      text-align: center;
      padding: 32px;
      border-top: 1px solid #ddd;
    }

    #load-more-btn {
      padding: 12px 40px;
      border: 1px solid #111;
      background: #fff;
      font-size: 0.9rem;
      cursor: pointer;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-family: inherit;
      transition: background 0.2s, color 0.2s;
    }

    #load-more-btn:hover {
      background: #111;
      color: #fff;
    }

    #empty-state {
      display: none;
      padding: 60px 40px;
      text-align: center;
      color: #999;
      font-size: 0.95rem;
      letter-spacing: 0.04em;
    }
  </style>
</head>
<body>

  <header>
    <h1>Image Search</h1>
  </header>

  <div class="search-section">
    <input type="text" id="search-input" placeholder="Search images... (e.g. mountains, coffee, cats)" />
    <button id="search-btn">Search</button>
  </div>

  <div id="error-banner"></div>
  <div id="loading"><span>Loading...</span></div>
  <div id="empty-state">No images found. Try a different keyword.</div>
  <div id="gallery"></div>

  <div id="load-more-section">
    <button id="load-more-btn">Load More</button>
  </div>

 <script src="app.js"></script>
</body>
</html>
